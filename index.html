<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP Viewer</title>
  <style>
    :root {
      --bg: #0a0f15;
      --bg-2: #111a25;
      --panel: rgba(17, 26, 37, 0.78);
      --line: rgba(130, 163, 194, 0.22);
      --text: #eaf2fb;
      --muted: #99afc5;
      --primary: #3a9df2;
      --ok: #49d38e;
      --warn: #f5b457;
      --danger: #ff6f6f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 700px at 15% 0%, #162334 0%, var(--bg) 58%);
      overflow: hidden;
    }
    .viewer-shell {
      position: relative;
      width: 100%;
      height: 100%;
      background: linear-gradient(165deg, #0f151d, #090d13);
    }
    #viewport {
      position: absolute;
      inset: 0;
    }

    .topbar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 5;
      width: fit-content;
      max-width: calc(100% - 24px);
    }
    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: 6px;
      color: #dbe9f8;
    }
    .group {
      display: inline-flex;
      gap: 10px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(15, 24, 34, 0.62);
      backdrop-filter: blur(6px);
    }
    .group-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 6px;
    }
    .group-title {
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }
    .mode-group {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      z-index: 5;
      width: 330px;
    }
    .group-right {
      margin-left: auto;
    }
    .btn {
      border: 1px solid var(--line);
      background: #1b2734;
      color: var(--text);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      padding: 11px 14px;
      cursor: pointer;
      transition: all .15s ease;
    }
    .btn:hover { border-color: #5f85a8; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn.active {
      background: linear-gradient(180deg, #2f8fe0, #2679bf);
      border-color: #56aaf5;
      color: #fff;
    }
    .btn.ghost { background: #16212d; }
    .btn.warn { border-color: rgba(245, 180, 87, 0.45); }

    #fileInput { display: none; }

    .status-pill {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: 58vw;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      z-index: 4;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .measure-hud {
      position: absolute;
      top: 300px;
      right: 12px;
      min-width: 300px;
      max-width: min(520px, 64vw);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(10, 18, 27, 0.84);
      padding: 14px 16px;
      z-index: 4;
      backdrop-filter: blur(8px);
    }
    .global-hud {
      position: absolute;
      top: 110px;
      right: 12px;
      min-width: 300px;
      max-width: min(520px, 64vw);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(10, 18, 27, 0.7);
      padding: 12px 14px;
      z-index: 4;
      backdrop-filter: blur(8px);
    }
    .measure-title {
      font-size: 15px;
      color: #8eb0d1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #measureText, #globalText {
      margin: 0;
      font-size: 16px;
      line-height: 1.4;
      white-space: pre-line;
      color: var(--text);
      font-family: Consolas, monospace;
    }
    .unit-float {
      position: absolute;
      top: 506px;
      right: 77px;
      z-index: 5;
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      width: 170px;
      justify-content: center;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(8px);
    }
    .side-tools {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      width: 150px;
    }
    .side-tools .btn {
      width: 100%;
      text-align: center;
    }
    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .mode-row-single {
      grid-template-columns: 1fr;
    }
    .mode-group .mode-row .btn {
      width: 100%;
      padding: 12px 10px;
      font-size: 16px;
      border-radius: 11px;
    }
    .measure-inline {
      min-width: 0;
      width: 100%;
      padding: 12px 12px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(180deg, #2f8fe0, #2679bf);
      border-color: #56aaf5;
      color: #fff;
    }

    #axisWidget {
      position: absolute;
      left: 12px;
      bottom: 52px;
      width: 112px;
      height: 112px;
      border-radius: 10px;
      background: rgba(13, 20, 30, 0.75);
      border: 1px solid var(--line);
      pointer-events: none;
      z-index: 4;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    }
    #axisWidget canvas {
      width: 112px !important;
      height: 112px !important;
      display: block;
    }
    .axis-label {
      position: absolute;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 700;
      opacity: 0.82;
      text-shadow: 0 0 3px rgba(0, 0, 0, 0.9);
      user-select: none;
    }
    #axisLabelX { color: #ea5757; }
    #axisLabelY { color: #58d06d; }
    #axisLabelZ { color: #5f9bff; }

    .confirm-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 8;
    }
    .confirm-card {
      width: min(360px, 92%);
      background: #1a2431;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
    }
    .confirm-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .confirm-text { font-size: 13px; color: var(--muted); margin-bottom: 12px; white-space: pre-line; }
    .confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    @media (max-width: 980px) {
      .topbar {
        gap: 6px;
        width: calc(100% - 16px);
        max-width: none;
      }
      .brand { width: 100%; margin-bottom: 4px; }
      .measure-hud { top: 336px; right: 8px; max-width: 78vw; min-width: 240px; }
      .global-hud { top: 146px; right: 8px; max-width: 78vw; min-width: 240px; }
      .unit-float { top: 548px; right: 43px; width: 170px; }
      .mode-group { bottom: 34px; width: 300px; }
      .side-tools {
        top: auto;
        bottom: 180px;
        transform: none;
      }
      .status-pill { max-width: 85vw; }
    }
  </style>
</head>
<body>
  <div class="viewer-shell">
    <div id="viewport"></div>

    <div class="topbar">
      <span class="brand">STEP Viewer</span>
      <button id="openBtn" class="btn active">Open STEP</button>
      <input id="fileInput" type="file" accept=".step,.stp" />

    </div>
    <div class="side-tools">
      <button id="isolateBtn" class="btn" disabled>Isolate</button>
      <button id="hideBtn" class="btn" disabled>Hide</button>
      <button id="showAllBtn" class="btn" disabled>Show all</button>
    </div>

    <div class="measure-hud">
      <div class="measure-title">Part Measurements</div>
      <pre id="measureText">-</pre>
    </div>
    <div class="global-hud">
      <div class="measure-title">Global Measurements</div>
      <pre id="globalText">-</pre>
    </div>
    <div class="unit-float">
      <button id="unitMM" class="btn active" disabled>mm</button>
      <button id="unitIN" class="btn" disabled>inch</button>
    </div>
    <div class="group group-stack mode-group">
      <span class="group-title">Measurement mode</span>
      <div class="mode-row">
        <button id="modeSelected" class="btn active" disabled>Selected</button>
        <button id="modeAB" class="btn" disabled>2 points</button>
        <button id="snapBtn" class="btn active" disabled>Snap</button>
      </div>
      <div class="mode-row mode-row-single">
        <button id="measureBtn" class="btn measure-inline" disabled>Measure</button>
      </div>
    </div>

    <div id="axisWidget" aria-hidden="true">
      <span id="axisLabelX" class="axis-label">X</span>
      <span id="axisLabelY" class="axis-label">Y</span>
      <span id="axisLabelZ" class="axis-label">Z</span>
    </div>

    <div id="statusPill" class="status-pill">Loading 3D engine...</div>

    <div id="confirmOverlay" class="confirm-overlay" aria-hidden="true">
      <div class="confirm-card">
        <div class="confirm-title">Confirm Hide</div>
        <div id="confirmText" class="confirm-text">Hide this part?</div>
        <div class="confirm-actions">
          <button id="confirmNoBtn" class="btn">Cancel</button>
          <button id="confirmYesBtn" class="btn active">Hide</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./vendor/three.min.js"></script>
  <script src="./vendor/occt-import-js.js"></script>
  <script>
    const state = {
      occt: null,
      meshes: [],
      selectedMesh: null,
      bounds: null,
      fileName: '',
      pickMode: false,
      pickStage: 0,
      pointA: null,
      pointB: null,
      snapToVertex: true,
      unit: 'mm',
      measureMode: 'selected'
    };

    const viewport = document.getElementById('viewport');
    const statusPill = document.getElementById('statusPill');
    const measureText = document.getElementById('measureText');
    const globalText = document.getElementById('globalText');
    const fileInput = document.getElementById('fileInput');
    const openBtn = document.getElementById('openBtn');
    const modeSelected = document.getElementById('modeSelected');
    const modeAB = document.getElementById('modeAB');
    const measureBtn = document.getElementById('measureBtn');
    const unitMM = document.getElementById('unitMM');
    const unitIN = document.getElementById('unitIN');
    const snapBtn = document.getElementById('snapBtn');
    const isolateBtn = document.getElementById('isolateBtn');
    const hideBtn = document.getElementById('hideBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const axisWidget = document.getElementById('axisWidget');
    const axisLabelX = document.getElementById('axisLabelX');
    const axisLabelY = document.getElementById('axisLabelY');
    const axisLabelZ = document.getElementById('axisLabelZ');
    const confirmOverlay = document.getElementById('confirmOverlay');
    const confirmText = document.getElementById('confirmText');
    const confirmYesBtn = document.getElementById('confirmYesBtn');
    const confirmNoBtn = document.getElementById('confirmNoBtn');

    if (!window.THREE || !window.occtimportjs) {
      statusPill.textContent = 'Offline libs missing in ./vendor';
      measureText.textContent = 'Missing: three.min.js / occt-import-js.js / wasm';
      throw new Error('Missing offline vendor libraries');
    }

    function setStatus(text) {
      statusPill.textContent = text;
    }

    function setMeasure(lines) {
      measureText.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || '-');
    }

    function setGlobal(lines) {
      globalText.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || '-');
    }

    function unitSuffix() {
      return state.unit === 'inch' ? 'in' : 'mm';
    }

    function formatLength(vMm) {
      const val = state.unit === 'inch' ? (vMm / 25.4) : vMm;
      return `${val.toFixed(3)} ${unitSuffix()}`;
    }

    function setMode(mode) {
      state.measureMode = mode;
      [modeSelected, modeAB].forEach((b) => b.classList.remove('active'));
      if (mode === 'selected') modeSelected.classList.add('active');
      if (mode === 'point_to_point') modeAB.classList.add('active');
      resetPointToPoint();
      if (mode === 'point_to_point') {
        measureBtn.disabled = false;
        setStatus('Mode: A-B');
      } else {
        measureBtn.disabled = true;
        setStatus('Mode: selected');
        if (state.selectedMesh) setMeasure(measureSelected());
        else setMeasure('Select a part to display measurements.');
      }
    }

    function setUnit(unit) {
      state.unit = unit;
      unitMM.classList.toggle('active', unit === 'mm');
      unitIN.classList.toggle('active', unit === 'inch');
    }

    function setSnap(enabled) {
      state.snapToVertex = !!enabled;
      snapBtn.classList.toggle('active', state.snapToVertex);
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1118);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 500000);
    camera.position.set(350, 350, 350);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    viewport.appendChild(renderer.domElement);

    const AXIS_WIDGET_SIZE = 112;
    const axisRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    axisRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    axisRenderer.setSize(AXIS_WIDGET_SIZE, AXIS_WIDGET_SIZE);
    axisWidget.prepend(axisRenderer.domElement);
    const axisScene = new THREE.Scene();
    const axisCamera = new THREE.PerspectiveCamera(45, 1, 0.01, 10);
    axisCamera.position.set(0, 0, 3);
    axisCamera.lookAt(0, 0, 0);
    const axisGizmo = new THREE.AxesHelper(0.95);
    axisScene.add(axisGizmo);

    const cameraCtrl = {
      target: new THREE.Vector3(0, 0, 0),
      radius: 700,
      theta: Math.PI / 4,
      phi: Math.PI / 3
    };

    function updateCamera() {
      const sinPhi = Math.sin(cameraCtrl.phi);
      const x = cameraCtrl.target.x + cameraCtrl.radius * sinPhi * Math.cos(cameraCtrl.theta);
      const y = cameraCtrl.target.y + cameraCtrl.radius * Math.cos(cameraCtrl.phi);
      const z = cameraCtrl.target.z + cameraCtrl.radius * sinPhi * Math.sin(cameraCtrl.theta);
      camera.position.set(x, y, z);
      camera.lookAt(cameraCtrl.target);
    }
    updateCamera();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x31465a, 1.08));
    const dir = new THREE.DirectionalLight(0xffffff, 0.72);
    dir.position.set(1, 2, 2);
    scene.add(dir);

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);
    const measurementGroup = new THREE.Group();
    scene.add(measurementGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function resize() {
      const w = viewport.clientWidth;
      const h = viewport.clientHeight;
      camera.aspect = w / Math.max(1, h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', resize);
    resize();

    let dragMode = null;
    let lastX = 0;
    let lastY = 0;
    let mouseDownX = 0;
    let mouseDownY = 0;

    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
    viewport.addEventListener('contextmenu', (e) => e.preventDefault());
    axisWidget.addEventListener('contextmenu', (e) => e.preventDefault());
    confirmOverlay.addEventListener('contextmenu', (e) => e.preventDefault());

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (e.button === 0) dragMode = 'rotate';
      else if (e.button === 2) dragMode = 'pan';
      else return;
      lastX = e.clientX;
      lastY = e.clientY;
      mouseDownX = e.clientX;
      mouseDownY = e.clientY;
    });

    window.addEventListener('mouseup', () => { dragMode = null; });

    window.addEventListener('mousemove', (e) => {
      if (!dragMode) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;

      if (dragMode === 'rotate') {
        cameraCtrl.theta += dx * 0.008;
        cameraCtrl.phi -= dy * 0.008;
        cameraCtrl.phi = Math.max(0.08, Math.min(Math.PI - 0.08, cameraCtrl.phi));
      } else if (dragMode === 'pan') {
        const panSpeed = cameraCtrl.radius * 0.0012;
        const dirVec = new THREE.Vector3().subVectors(camera.position, cameraCtrl.target).normalize();
        const right = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), dirVec).normalize();
        const up = new THREE.Vector3().crossVectors(dirVec, right).normalize();
        cameraCtrl.target.addScaledVector(right, -dx * panSpeed);
        cameraCtrl.target.addScaledVector(up, dy * panSpeed);
      }
      updateCamera();
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 1.1 : 0.9;
      cameraCtrl.radius = Math.max(0.1, cameraCtrl.radius * factor);
      updateCamera();
    }, { passive: false });

    function isDrag(evt, thresholdPx) {
      const dx = evt.clientX - mouseDownX;
      const dy = evt.clientY - mouseDownY;
      return ((dx * dx) + (dy * dy)) > (thresholdPx * thresholdPx);
    }

    function animate() {
      renderer.render(scene, camera);
      renderAxisWidget();
      requestAnimationFrame(animate);
    }
    animate();

    function setAxisLabelPosition(labelEl, vec3) {
      const projected = vec3.clone().project(axisCamera);
      const px = (projected.x * 0.5 + 0.5) * AXIS_WIDGET_SIZE;
      const py = (-projected.y * 0.5 + 0.5) * AXIS_WIDGET_SIZE;
      labelEl.style.left = `${px}px`;
      labelEl.style.top = `${py}px`;
      const depthFade = 0.45 + ((-projected.z + 1) * 0.25);
      labelEl.style.opacity = `${Math.max(0.35, Math.min(0.9, depthFade))}`;
    }

    function renderAxisWidget() {
      axisGizmo.quaternion.copy(camera.quaternion).invert();
      axisRenderer.render(axisScene, axisCamera);
      setAxisLabelPosition(axisLabelX, new THREE.Vector3(1, 0, 0).applyQuaternion(axisGizmo.quaternion));
      setAxisLabelPosition(axisLabelY, new THREE.Vector3(0, 1, 0).applyQuaternion(axisGizmo.quaternion));
      setAxisLabelPosition(axisLabelZ, new THREE.Vector3(0, 0, 1).applyQuaternion(axisGizmo.quaternion));
    }

    function clearModel() {
      while (rootGroup.children.length) {
        const child = rootGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
      state.meshes = [];
      state.selectedMesh = null;
      state.bounds = null;
      resetPointToPoint();
      setMeasure('-');
    }

    function clearMeasurementVisuals() {
      while (measurementGroup.children.length) {
        const child = measurementGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function resetPointToPoint() {
      state.pickMode = false;
      state.pickStage = 0;
      state.pointA = null;
      state.pointB = null;
      clearMeasurementVisuals();
    }

    function addPointMarker(position, colorHex) {
      const geom = new THREE.SphereGeometry(Math.max(0.8, cameraCtrl.radius * 0.01), 18, 18);
      const mat = new THREE.MeshStandardMaterial({ color: colorHex, emissive: colorHex, emissiveIntensity: 0.2 });
      const marker = new THREE.Mesh(geom, mat);
      marker.position.copy(position);
      measurementGroup.add(marker);
    }

    function addDistanceLine(start, end) {
      const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
      const mat = new THREE.LineBasicMaterial({ color: 0xffd166 });
      measurementGroup.add(new THREE.Line(geom, mat));
    }

    function colorFrom(meshData) {
      const c = meshData.color;
      if (!c || c.length !== 3) return new THREE.Color(0xd8e6f6);
      const base = new THREE.Color(c[0] / 255, c[1] / 255, c[2] / 255);
      return base.lerp(new THREE.Color(0xffffff), 0.35);
    }

    function firstArray(obj, paths) {
      for (const p of paths) {
        let v = obj;
        let ok = true;
        for (const k of p) {
          if (v && Object.prototype.hasOwnProperty.call(v, k)) v = v[k];
          else { ok = false; break; }
        }
        if (ok && Array.isArray(v) && v.length) return v;
        if (ok && ArrayBuffer.isView(v) && v.length) return Array.from(v);
      }
      return null;
    }

    function extractBuffers(meshData) {
      const posA = firstArray(meshData, [['attributes','position','array'], ['position','array'], ['positions']]);
      const idxA = firstArray(meshData, [['index','array'], ['indices'], ['tri_indexes']]);
      const nrmA = firstArray(meshData, [['attributes','normal','array'], ['normal','array'], ['normals']]);
      if (posA && posA.length >= 9) return { pos: posA, idx: idxA, nrm: nrmA };

      const faces = meshData?.brep_faces;
      if (Array.isArray(faces) && faces.length) {
        const pos = []; const nrm = []; const idx = [];
        let vertexOffset = 0;
        for (const face of faces) {
          const fPos = firstArray(face, [['vertex_coord'], ['positions']]);
          if (!fPos || fPos.length < 9) continue;
          const fNrm = firstArray(face, [['normal_coord'], ['normals']]);
          const fIdx = firstArray(face, [['tri_indexes'], ['indices']]);
          for (const v of fPos) pos.push(v);
          if (fNrm && fNrm.length === fPos.length) for (const n of fNrm) nrm.push(n);
          if (fIdx && fIdx.length >= 3) for (const ii of fIdx) idx.push(ii + vertexOffset);
          else {
            const count = Math.floor(fPos.length / 3);
            for (let i = 0; i + 2 < count; i += 3) idx.push(vertexOffset + i, vertexOffset + i + 1, vertexOffset + i + 2);
          }
          vertexOffset += Math.floor(fPos.length / 3);
        }
        if (pos.length >= 9) return { pos, idx: idx.length ? idx : null, nrm: nrm.length ? nrm : null };
      }
      return null;
    }

    function createMeshFromOcct(meshData, index) {
      const buffers = extractBuffers(meshData);
      if (!buffers) return null;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.Float32BufferAttribute(buffers.pos, 3));
      if (buffers.idx && buffers.idx.length >= 3) geometry.setIndex(buffers.idx);
      if (buffers.nrm && buffers.nrm.length === buffers.pos.length) {
        geometry.setAttribute('normal', new THREE.Float32BufferAttribute(buffers.nrm, 3));
      } else geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();

      const material = new THREE.MeshStandardMaterial({ color: colorFrom(meshData), roughness: 0.55, metalness: 0.05, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.userData.partName = meshData.name || `Part ${index + 1}`;
      mesh.userData.originalColor = material.color.clone();
      return mesh;
    }

    function fitAll() {
      if (!state.bounds) return;
      const center = state.bounds.getCenter(new THREE.Vector3());
      const size = state.bounds.getSize(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z) * 1.8 || 10;
      cameraCtrl.target.copy(center);
      cameraCtrl.radius = radius;
      cameraCtrl.theta = Math.PI / 4;
      cameraCtrl.phi = Math.PI / 3;
      camera.near = Math.max(0.1, radius / 200);
      camera.far = Math.max(1000, radius * 100);
      camera.updateProjectionMatrix();
      updateCamera();
    }

    function updateGlobalBounds() {
      const box = new THREE.Box3();
      state.meshes.forEach((m) => { if (m.visible) box.expandByObject(m); });
      state.bounds = box.isEmpty() ? null : box;
    }

    function setUiEnabled(enabled) {
      [modeSelected, modeAB, unitMM, unitIN, snapBtn, isolateBtn, hideBtn, showAllBtn].forEach((el) => { el.disabled = !enabled; });
      if (!enabled) measureBtn.disabled = true;
      openBtn.disabled = !state.occt;
    }

    function applySelection(mesh) {
      if (state.selectedMesh && state.selectedMesh.material) {
        state.selectedMesh.material.color.copy(state.selectedMesh.userData.originalColor);
      }
      state.selectedMesh = mesh;
      if (mesh && mesh.material) mesh.material.color.set(0xff8a00);
    }

    function hideMesh(mesh) {
      if (!mesh) return;
      mesh.visible = false;
      if (state.selectedMesh === mesh) applySelection(null);
      updateGlobalBounds();
      renderer.render(scene, camera);
    }

    function askHideConfirm(partName) {
      return new Promise((resolve) => {
        confirmText.textContent = `Hide this part?\n\n${partName}`;
        confirmOverlay.style.display = 'flex';

        const cleanup = () => {
          confirmOverlay.style.display = 'none';
          confirmYesBtn.removeEventListener('click', onYes);
          confirmNoBtn.removeEventListener('click', onNo);
          confirmOverlay.removeEventListener('click', onOverlayClick);
        };
        const onYes = () => { cleanup(); resolve(true); };
        const onNo = () => { cleanup(); resolve(false); };
        const onOverlayClick = (e) => { if (e.target === confirmOverlay) onNo(); };

        confirmYesBtn.addEventListener('click', onYes);
        confirmNoBtn.addEventListener('click', onNo);
        confirmOverlay.addEventListener('click', onOverlayClick);
      });
    }

    async function initOcct() {
      try {
        const locateBase = './vendor/';
        state.occt = await window.occtimportjs({ locateFile: (file) => locateBase + file });
        setStatus('Ready. Open a STEP file.');
        setUiEnabled(false);
        openBtn.disabled = false;
      } catch (err) {
        console.error(err);
        setStatus('3D engine failed to load (check local vendor files).');
        setMeasure(['STARTUP ERROR', 'Missing JS/WASM in ./vendor']);
      }
    }

    async function loadStepFile(file) {
      if (!state.occt) {
        setStatus('Engine not ready.');
        return;
      }

      setStatus('Reading STEP file...');
      clearModel();

      let result = null;
      try {
        const arr = new Uint8Array(await file.arrayBuffer());
        result = state.occt.ReadStepFile(arr, {
          linearUnit: 'millimeter',
          linearDeflectionType: 'bounding_box_ratio',
          linearDeflection: 0.001,
          angularDeflection: 0.5
        });
      } catch (err) {
        console.error(err);
        setStatus('STEP read error.');
        setMeasure(['READ ERROR', `File: ${file.name}`]);
        setUiEnabled(false);
        return;
      }

      if (!result || !result.success || !Array.isArray(result.meshes) || result.meshes.length === 0) {
        setStatus('Read failed: STEP unsupported or empty.');
        setMeasure(['NO GEOMETRY', `File: ${file.name}`]);
        setUiEnabled(false);
        return;
      }

      result.meshes.forEach((meshData, i) => {
        const mesh = createMeshFromOcct(meshData, i);
        if (!mesh) return;
        rootGroup.add(mesh);
        state.meshes.push(mesh);
      });

      if (!state.meshes.length) {
        setStatus('File read, but no displayable geometry.');
        setMeasure(['NO GEOMETRY', `File: ${file.name}`]);
        setUiEnabled(false);
        return;
      }

      updateGlobalBounds();
      fitAll();
      state.fileName = file.name;
      setStatus(`${file.name} | ${state.meshes.length} part(s)`);
      setMode('selected');
      setUnit('mm');
      setSnap(true);
      setUiEnabled(true);
      setGlobal(measureGlobal());
      setMeasure('Select a part to display measurements.');
    }

    function measureGlobal() {
      if (!state.bounds) return ['Model is empty.'];
      const size = state.bounds.getSize(new THREE.Vector3());
      const diag = Math.sqrt(size.x ** 2 + size.y ** 2 + size.z ** 2);
      return ['Global', `X: ${formatLength(size.x)}`, `Y: ${formatLength(size.y)}`, `Z: ${formatLength(size.z)}`, `Diagonal: ${formatLength(diag)}`];
    }

    function measureSelected() {
      if (!state.selectedMesh) return ['Select a part first.'];
      const box = new THREE.Box3().setFromObject(state.selectedMesh);
      const size = box.getSize(new THREE.Vector3());
      const diag = Math.sqrt(size.x ** 2 + size.y ** 2 + size.z ** 2);
      const name = state.selectedMesh.userData.partName || 'Part';
      return [`Selected: ${name}`, `X: ${formatLength(size.x)}`, `Y: ${formatLength(size.y)}`, `Z: ${formatLength(size.z)}`, `Diagonal: ${formatLength(diag)}`];
    }

    function measurePointToPoint() {
      if (!state.pointA || !state.pointB) return ['Pick A then B in 3D.'];
      const dist = state.pointA.distanceTo(state.pointB);
      return ['Point A -> B', `Distance: ${formatLength(dist)}`];
    }

    function pickHitFromEvent(evt) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((evt.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((evt.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(state.meshes, false)[0] || null;
    }

    function snappedPointFromHit(hit) {
      if (!hit) return null;
      if (!state.snapToVertex) return hit.point.clone();

      const geom = hit.object?.geometry;
      const posAttr = geom?.attributes?.position;
      const face = hit.face;
      if (!geom || !posAttr || !face) return hit.point.clone();

      const va = new THREE.Vector3().fromBufferAttribute(posAttr, face.a);
      const vb = new THREE.Vector3().fromBufferAttribute(posAttr, face.b);
      const vc = new THREE.Vector3().fromBufferAttribute(posAttr, face.c);
      hit.object.localToWorld(va);
      hit.object.localToWorld(vb);
      hit.object.localToWorld(vc);

      const p = hit.point;
      const da = p.distanceToSquared(va);
      const db = p.distanceToSquared(vb);
      const dc = p.distanceToSquared(vc);
      if (da <= db && da <= dc) return va;
      if (db <= da && db <= dc) return vb;
      return vc;
    }

    renderer.domElement.addEventListener('mouseup', (evt) => {
      if (evt.button !== 2) return;
      if (isDrag(evt, 5)) return;
      if (!state.meshes.length) return;
      const hit = pickHitFromEvent(evt);
      if (!hit || !hit.object || !hit.object.visible) return;
      const partName = hit.object.userData.partName || 'Part';
      askHideConfirm(partName).then((ok) => {
        if (!ok) {
          setStatus('Hide canceled.');
          return;
        }
        hideMesh(hit.object);
        setStatus(`Part hidden: ${partName}`);
      });
    });

    renderer.domElement.addEventListener('click', (evt) => {
      if (!state.meshes.length) return;
      if (isDrag(evt, 5)) return;
      const hit = pickHitFromEvent(evt);
      if (!hit) return;
      const point = snappedPointFromHit(hit);
      if (!point) return;

      if (state.pickMode) {
        if (state.pickStage === 1) {
          state.pointA = point;
          state.pointB = null;
          clearMeasurementVisuals();
          addPointMarker(state.pointA, 0x2ec4b6);
          state.pickStage = 2;
          setMeasure(['Point A set', 'Click point B']);
          setStatus('Point A captured.');
          return;
        }
        if (state.pickStage === 2) {
          state.pointB = point;
          addPointMarker(state.pointB, 0xff6b6b);
          addDistanceLine(state.pointA, state.pointB);
          state.pickMode = false;
          state.pickStage = 0;
          setMeasure(measurePointToPoint());
          setStatus('Point-to-point done.');
          return;
        }
      }

      applySelection(hit.object);
      setStatus(`Selected: ${hit.object.userData.partName || 'Part'}`);
      if (state.measureMode === 'selected') {
        setMeasure(measureSelected());
      }
    });

    openBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      await loadStepFile(file);
    });

    modeSelected.addEventListener('click', () => setMode('selected'));
    modeAB.addEventListener('click', () => setMode('point_to_point'));

    unitMM.addEventListener('click', () => {
      setUnit('mm');
      setGlobal(measureGlobal());
      if (state.measureMode === 'selected' && state.selectedMesh) setMeasure(measureSelected());
      if (!state.pickMode && state.pointA && state.pointB) setMeasure(measurePointToPoint());
    });
    unitIN.addEventListener('click', () => {
      setUnit('inch');
      setGlobal(measureGlobal());
      if (state.measureMode === 'selected' && state.selectedMesh) setMeasure(measureSelected());
      if (!state.pickMode && state.pointA && state.pointB) setMeasure(measurePointToPoint());
    });

    snapBtn.addEventListener('click', () => setSnap(!state.snapToVertex));

    isolateBtn.addEventListener('click', () => {
      if (!state.selectedMesh) {
        setStatus('Select a part first, then Isolate.');
        return;
      }
      state.meshes.forEach((m) => { m.visible = (m === state.selectedMesh); });
      updateGlobalBounds();
      renderer.render(scene, camera);
      setStatus('Selected part isolated.');
    });

    hideBtn.addEventListener('click', () => {
      if (!state.selectedMesh) {
        setStatus('Select a part first, then Hide.');
        return;
      }
      const selectedName = state.selectedMesh.userData.partName || 'Part';
      hideMesh(state.selectedMesh);
      setStatus(`Part hidden: ${selectedName}`);
    });

    showAllBtn.addEventListener('click', () => {
      state.meshes.forEach((m) => { m.visible = true; });
      updateGlobalBounds();
      renderer.render(scene, camera);
      setStatus('All parts visible.');
    });

    measureBtn.addEventListener('click', () => {
      if (state.measureMode !== 'point_to_point') return;

      resetPointToPoint();
      state.pickMode = true;
      state.pickStage = 1;
      setMeasure(['A-B mode', 'Click point A in 3D']);
      setStatus('Point-to-point mode active.');
    });

    window.addEventListener('error', (ev) => {
      setStatus('Blocking JavaScript error.');
      setMeasure(`JS ERROR: ${ev.message || 'unknown'}`);
    });

    setUiEnabled(false);
    setMeasure('Open a STEP file to start.');
    initOcct();
  </script>
</body>
</html>
